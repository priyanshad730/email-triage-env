<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Triage — Live Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: #888;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-easy   { background: #4ade80; color: #052e16; }
    .btn-medium { background: #facc15; color: #422006; }
    .btn-hard   { background: #f87171; color: #450a0a; }
    .btn-reset  { background: #334155; color: #e0e0e0; }

    .score-bar {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .score-card {
      background: #1e2433;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      min-width: 120px;
    }

    .score-card .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .score-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
    }

    .score-card .value.good  { color: #4ade80; }
    .score-card .value.ok    { color: #facc15; }
    .score-card .value.bad   { color: #f87171; }

    .status-bar {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
      min-height: 20px;
    }

    .emails-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .email-card {
      background: #1e2433;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #2a3244;
      transition: border-color 0.3s, transform 0.2s;
      position: relative;
    }

    .email-card.active {
      border-color: #6366f1;
      transform: scale(1.01);
    }

    .email-card.done-correct { border-color: #4ade80; }
    .email-card.done-partial { border-color: #facc15; }
    .email-card.done-wrong   { border-color: #f87171; }

    .email-id {
      font-size: 11px;
      color: #555;
      margin-bottom: 6px;
      font-family: monospace;
    }

    .email-subject {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .email-body {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .tag-high     { background: #450a0a; color: #f87171; }
    .tag-medium   { background: #422006; color: #facc15; }
    .tag-low      { background: #052e16; color: #4ade80; }
    .tag-billing  { background: #1e1b4b; color: #a5b4fc; }
    .tag-technical{ background: #0c1a2e; color: #60a5fa; }
    .tag-general  { background: #1a1a2e; color: #c084fc; }
    .tag-duplicate{ background: #2d1a00; color: #fb923c; }

    .agent-decision {
      border-top: 1px solid #2a3244;
      padding-top: 10px;
      margin-top: 4px;
    }

    .agent-label {
      font-size: 11px;
      color: #555;
      margin-bottom: 6px;
    }

    .score-pill {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      margin-left: 8px;
    }

    .score-pill.good  { background: #052e16; color: #4ade80; }
    .score-pill.ok    { background: #422006; color: #facc15; }
    .score-pill.bad   { background: #450a0a; color: #f87171; }

    .thinking {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      animation: pulse 0.8s ease-in-out infinite;
      margin-right: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .empty-state {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 15px;
      grid-column: 1/-1;
    }

    .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="header">
  <h1>📧 Email Triage — Live Dashboard</h1>
  <p>Watch the AI agent classify emails in real time</p>
</div>

<div class="controls">
  <button class="btn btn-easy"   onclick="runTask('easy')">▶ Run Easy Task</button>
  <button class="btn btn-medium" onclick="runTask('medium')">▶ Run Medium Task</button>
  <button class="btn btn-hard"   onclick="runTask('hard')">▶ Run Hard Task</button>
  <button class="btn btn-reset"  onclick="resetDashboard()">↺ Reset</button>
</div>

<div class="score-bar">
  <div class="score-card">
    <div class="label">Current Score</div>
    <div class="value" id="current-score">—</div>
  </div>
  <div class="score-card">
    <div class="label">Emails Done</div>
    <div class="value" id="emails-done">—</div>
  </div>
  <div class="score-card">
    <div class="label">Task</div>
    <div class="value" id="current-task">—</div>
  </div>
  <div class="score-card">
    <div class="label">Status</div>
    <div class="value" id="status-icon">—</div>
  </div>
</div>

<div class="status-bar" id="status-bar">
  Choose a task above to start
</div>

<div class="emails-grid" id="emails-grid">
  <div class="empty-state">
    <div class="big">📭</div>
    Press a task button to load emails
  </div>
</div>

<script>
const API = '';  // same origin

let allEmails   = [];
let taskId      = '';
let running     = false;

function resetDashboard() {
  allEmails = [];
  taskId    = '';
  running   = false;
  document.getElementById('emails-grid').innerHTML = `
    <div class="empty-state">
      <div class="big">📭</div>
      Press a task button to load emails
    </div>`;
  document.getElementById('current-score').textContent = '—';
  document.getElementById('emails-done').textContent   = '—';
  document.getElementById('current-task').textContent  = '—';
  document.getElementById('status-icon').textContent   = '—';
  document.getElementById('status-bar').textContent    = 'Choose a task above to start';
}

function scoreClass(s) {
  if (s >= 0.8) return 'good';
  if (s >= 0.5) return 'ok';
  return 'bad';
}

function urgencyTag(u) {
  if (!u) return '';
  return `<span class="tag tag-${u}">${u}</span>`;
}

function deptTag(d) {
  if (!d) return '';
  return `<span class="tag tag-${d}">${d}</span>`;
}

function renderEmails(emails, decisions) {
  const grid = document.getElementById('emails-grid');
  grid.innerHTML = '';

  emails.forEach((email, i) => {
    const dec     = decisions[i];
    const isActive = dec && dec.thinking;
    const isDone   = dec && !dec.thinking && dec.urgency;

    let cardClass = 'email-card';
    if (isActive) cardClass += ' active';
    else if (isDone) {
      const s = dec.score || 0;
      if (s >= 0.8)      cardClass += ' done-correct';
      else if (s >= 0.4) cardClass += ' done-partial';
      else               cardClass += ' done-wrong';
    }

    let agentHtml = '';
    if (isActive) {
      agentHtml = `
        <div class="agent-decision">
          <div class="agent-label"><span class="thinking"></span>Agent is thinking...</div>
        </div>`;
    } else if (isDone) {
      const s     = dec.score || 0;
      const sClass = scoreClass(s);
      const dupTag = dec.is_duplicate
        ? `<span class="tag tag-duplicate">duplicate</span>`
        : '';
      agentHtml = `
        <div class="agent-decision">
          <div class="agent-label">Agent decision
            <span class="score-pill ${sClass}">${s.toFixed(2)}</span>
          </div>
          <div class="tags">
            ${urgencyTag(dec.urgency)}
            ${deptTag(dec.department)}
            ${dupTag}
          </div>
        </div>`;
    }

    grid.innerHTML += `
      <div class="${cardClass}" id="card-${email.id}">
        <div class="email-id">${email.id}</div>
        <div class="email-subject">${email.subject}</div>
        <div class="email-body">${email.body}</div>
        ${agentHtml}
      </div>`;
  });
}

async function runTask(task) {
  if (running) return;
  running = true;
  taskId  = task;

  document.getElementById('current-task').textContent  = task.toUpperCase();
  document.getElementById('status-icon').textContent   = '⏳';
  document.getElementById('status-bar').textContent    = 'Loading emails...';

  // Reset environment
  const resetRes = await fetch(`${API}/reset`, {
    method : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body   : JSON.stringify({ task_id: task }),
  });
  const resetData = await resetRes.json();
  allEmails       = resetData.emails;

  const decisions = new Array(allEmails.length).fill(null);
  renderEmails(allEmails, decisions);

  document.getElementById('emails-done').textContent  = `0 / ${allEmails.length}`;
  document.getElementById('current-score').textContent = '0.00';

  // Step through each email
  for (let i = 0; i < allEmails.length; i++) {
    const email = allEmails[i];

    // Show thinking state
    decisions[i] = { thinking: true };
    renderEmails(allEmails, decisions);
    document.getElementById('status-bar').innerHTML =
      `<span class="thinking"></span> Classifying email ${i+1} of ${allEmails.length}: "${email.subject}"`;

    // Call our simulate endpoint
    const stepRes = await fetch(`${API}/step`, {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        email_id    : email.id,
        urgency     : email.urgency,     // simulate perfect agent for demo
        department  : email.department,
        is_duplicate: email.duplicate_of !== null && email.duplicate_of !== undefined,
      }),
    });
    const stepData = await stepRes.json();

    // Record decision
    decisions[i] = {
      thinking    : false,
      urgency     : email.urgency,
      department  : email.department,
      is_duplicate: email.duplicate_of !== null,
      score       : stepData.reward.value,
    };

    renderEmails(allEmails, decisions);

    const scoreEl = document.getElementById('current-score');
    scoreEl.textContent  = stepData.reward.value.toFixed(4);
    scoreEl.className    = `value ${scoreClass(stepData.reward.value)}`;

    document.getElementById('emails-done').textContent =
      `${i+1} / ${allEmails.length}`;

    // Small delay so you can watch it happen
    await new Promise(r => setTimeout(r, 600));
  }

  document.getElementById('status-bar').textContent =
    `✅ Done! Final score: ${document.getElementById('current-score').textContent}`;
  document.getElementById('status-icon').textContent = '✅';
  running = false;
}
</script>
</body>
</html>
